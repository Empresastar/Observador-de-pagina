<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor Estático - URL Fixa</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; overflow: hidden; }
        
        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* Esquerda: Visualização */
        .viewport { flex: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Direita: Painel */
        .panel { width: 320px; background: #181818; display: flex; flex-direction: column; padding: 20px; border-left: 2px solid #333; }
        
        .status-box { 
            padding: 15px; border-radius: 8px; background: #222; border: 1px solid #444; 
            margin-bottom: 20px; text-align: center; 
        }
        .url-display { font-size: 11px; color: #888; word-break: break-all; margin-top: 5px; display: block; }
        
        h2 { font-size: 14px; color: #00d4ff; text-transform: uppercase; margin: 0 0 10px 0; }

        button { 
            width: 100%; padding: 15px; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s;
        }
        .btn-off { background: #00d4ff; color: #000; }
        .btn-on { background: #ff4757; color: #fff; }

        .log { 
            flex: 1; margin-top: 20px; overflow-y: auto; background: #000; 
            padding: 10px; border-radius: 5px; font-family: monospace; font-size: 11px;
        }
        .entry { padding: 5px 0; border-bottom: 1px solid #1a1a1a; color: #aaa; }
        .entry.alert { color: #ff4757; font-weight: bold; background: #2d1616; border-left: 3px solid #ff4757; padding-left: 5px; }
        .time { color: #555; margin-right: 5px; }

        #sync-tag {
            position: absolute; top: 10px; left: 10px; padding: 5px 15px; 
            background: rgba(0,0,0,0.8); border-radius: 20px; font-size: 12px;
            border: 1px solid #00d4ff; color: #00d4ff; display: none; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="viewport">
        <div id="sync-tag">ANALISANDO...</div>
        <iframe id="frame" src="about:blank"></iframe>
    </div>

    <div class="panel">
        <div class="status-box">
            <h2>Alvo Fixado</h2>
            <span class="url-display" id="targetDisplay">https://www.exemplo.com</span>
        </div>

        <button id="mainBtn" class="btn-off" onclick="toggle()">Iniciar Monitor</button>

        <div class="log" id="logBox">
            <div class="entry">Sistema aguardando início...</div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO ---
    const URL_ALVO = "https://empresastar.github.io/Observador-de-pagina/"; // <--- MUDE A URL AQUI
    const INTERVALO = 20000; // Tempo em milisegundos (20 segundos)
    // --------------------

    let ativo = false;
    let ultimaHash = "";
    let loop;

    document.getElementById('targetDisplay').innerText = URL_ALVO;

    async function scan() {
        if (!ativo) return;

        const frame = document.getElementById('frame');
        const tag = document.getElementById('sync-tag');
        const hora = new Date().toLocaleTimeString();

        // Atualiza o iframe visualmente
        frame.src = URL_ALVO;
        tag.style.display = "block";

        try {
            // Bypass de CORS via Proxy
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(URL_ALVO)}`;
            const response = await fetch(proxyUrl);
            const html = await response.text();

            // Limpeza para evitar alarmes falsos (remove scripts e tokens dinâmicos)
            const conteudoAtual = html
                .replace(/<script.*?>.*?<\/script>/gs, "")
                .replace(/<input type="hidden".*?>/g, "")
                .substring(0, 10000); 

            if (ultimaHash && conteudoAtual !== ultimaHash) {
                addLog(hora, "⚠️ MUDANÇA DETECTADA NO CONTEÚDO!", true);
                tag.style.borderColor = "#ff4757";
                tag.style.color = "#ff4757";
                tag.innerText = "ALERTA DE ALTERAÇÃO";
                
                // Aviso sonoro básico
                const beep = new AudioContext();
                const osc = beep.createOscillator();
                osc.connect(beep.destination);
                osc.start();
                osc.stop(beep.currentTime + 0.1);
            } else {
                addLog(hora, "Checagem: Sem alterações.", false);
                tag.style.borderColor = "#00d4ff";
                tag.style.color = "#00d4ff";
                tag.innerText = "SINCRO: OK";
            }

            ultimaHash = conteudoAtual;

        } catch (e) {
            addLog(hora, "Erro de conexão/CORS.", false);
        }
    }

    function addLog(hora, msg, isAlert) {
        const div = document.createElement('div');
        div.className = `entry ${isAlert ? 'alert' : ''}`;
        div.innerHTML = `<span class="time">[${hora}]</span> ${msg}`;
        const box = document.getElementById('logBox');
        box.prepend(div);
    }

    function toggle() {
        const btn = document.getElementById('mainBtn');
        if (!ativo) {
            ativo = true;
            btn.innerText = "Parar Ciclo";
            btn.className = "btn-on";
            scan();
            loop = setInterval(scan, INTERVALO);
        } else {
            ativo = false;
            btn.innerText = "Iniciar Monitor";
            btn.className = "btn-off";
            clearInterval(loop);
            document.getElementById('sync-tag').style.display = "none";
        }
    }
</script>

</body>
</html>
